<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <title>صفحه اصلی - بوت‌استرپ</title>
</head>

<body class="bg-light">
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container justify-content-center">
            <div class="navbar-nav">

                <a class="nav-link {% block home %} {% endblock %} " href="{{ url_for('home') }}">خانه</a>
                <a class="nav-link {% block about %} {% endblock %} " href="{{ url_for('about') }}">درباره ما</a>
                <a class="nav-link {% block contact %} {% endblock %} " href="{{ url_for('contact') }}">تماس</a>
                {#
                    <a class="nav-link " href="{{url_for('list_blog')}}">وبلاگ</a>
                #}
            </div>
        </div>
    </nav>
<!-- message -->
    <div class="">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {%for category, messag in messages %}

                    <div class="m-4 alert alert-{{category}} alert-dismissible fade show" role="alert">
                        <strong>{{category}}</strong> {{messag}}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    
                {% endfor %}
            {% endif %}
        {% endwith %}

    </div>

	{% block content %}



	{% endblock %}



    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
