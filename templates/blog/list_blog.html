<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <title>وبلاگ</title>
</head>
<body class="bg-light">
    <!-- نوار ناوبری -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container justify-content-center">
            <div class="navbar-nav">
                
                <a class="nav-link " href="{{ url_for('home') }}">خانه</a>
                <a class="nav-link active" href="{{url_for('list_blog')}}">وبلاگ</a>
                <a class="nav-link" href="{{ url_for('about') }}">درباره ما</a>
                <a class="nav-link" href="{{ url_for('contact') }}">تماس</a>
            </div>
        </div>
    </nav>

    

   
    <div class="container">
        <div class="row">
            <!-- ستون اصلی مطالب -->
            <div class="col-md-8">
                <h2 class="mb-4">آخرین مطالب</h2>
                
                <!-- پست ۱ -->
                 {% for post in posts %}
                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h3 class="card-title h5">{{ post.title }}</h3>
                        <p class="card-text text-muted">{{ post.body }}</p>
                        <a href="/blog/{{ post.id }}" class="btn btn-outline-primary btn-sm">ادامه مطلب</a>
                    </div>
                </div>
                {% endfor %}

               
            </div>

            <!-- سایدبار (کناره) -->
            <div class="col-md-4">
                <div class="p-4 mb-3 bg-white rounded shadow-sm">
                    <h4 class="h6 font-bold">درباره وبلاگ</h4>
                    <p class="small mb-0">این یک سایدبار ساده برای نمایش توضیحات کوتاه یا دسته‌بندی‌هاست.</p>
                </div>
                <div class="list-group shadow-sm">
                    <span class="list-group-item list-group-item-dark">دسته‌بندی‌ها</span>
                    <a href="#" class="list-group-item list-group-item-action">آموزش HTML</a>
                    <a href="#" class="list-group-item list-group-item-action">ترفندهای CSS</a>
                    <a href="#" class="list-group-item list-group-item-action">اخبار تکنولوژی</a>
                </div>
            </div>
        </div>
    </div> 

    
</body>
</html>
